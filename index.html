<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول شعبة N</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff9f9; /* خلفية وردية خفيفة جداً */
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2);
        }

        h1 {
            color: #f06d06;
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .item {
            display: flex;
            align-items: center;
            background: #fffafa;
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 20px;
            border: 1px solid #ffe4e1;
            transition: transform 0.2s;
        }

        .item:hover {
            transform: scale(1.02);
        }

        .date-box {
            background: #f06d06;
            color: white;
            min-width: 80px;
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            font-size: 0.85em;
            line-height: 1.4;
        }

        .content {
            flex-grow: 1;
            margin-right: 15px;
        }

        .title {
            font-weight: bold;
            color: #444;
            display: block;
            margin-bottom: 5px;
        }

        .tags {
            display: flex;
            gap: 5px;
        }

        .tag {
            font-size: 0.7em;
            padding: 2px 10px;
            border-radius: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .tag.programming { background: #e0f7fa; color: #00838f; }
        .tag.english { background: #e8eaf6; color: #3f51b5; }
        .tag.math { background: #fff3e0; color: #ef6c00; }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #f06d06;
            border-radius: 50%;
            margin-left: 15px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>شعبة N ✨</h1>
    <p class="subtitle">قائمة المهام والاختبارات القادمة 🎀</p>

    <div class="item">
        <div class="dot"></div>
        <div class="content">
            <span class="title">كويز 2 (البرمجة)</span>
            <div class="tags">
                <span class="tag programming">PROGRAMMING</span>
            </div>
        </div>
        <div class="date-box">
            23 أبريل<br>الخميس
        </div>
    </div>

    <div class="item">
        <div class="dot"></div>
        <div class="content">
            <span class="title">واجب يونيت 8 و يونيت 9</span>
            <div class="tags">
                <span class="tag english">ENGLISH</span>
            </div>
        </div>
        <div class="date-box">
            23 أبريل<br>الخميس
        </div>
    </div>

    <div class="item">
        <div class="dot"></div>
        <div class="content">
            <span class="title">كويز 4 (آخر المحاضرة) - يونيت 7 و 8</span>
            <div class="tags">
                <span class="tag english">ENGLISH</span>
            </div>
        </div>
        <div class="date-box">
            27 أبريل<br>الاثنين
        </div>
    </div>

</div>

</body>
</html>
